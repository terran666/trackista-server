services:

  # ─────────────────────────────────────────────
  # REDIS — realtime storage, fast data layer
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trackista-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trackista-network

  # ─────────────────────────────────────────────
  # MYSQL — persistent storage, history, metadata
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: trackista-mysql
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trackista-network

  # ─────────────────────────────────────────────
  # BACKEND — Node.js API server
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: trackista-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MEDIA_OUTPUT_DIR: ${MEDIA_OUTPUT_DIR}
      # ── Klines cache (prevents repeated Binance calls on every frontend request)
      KLINES_CACHE_TTL_MS: ${KLINES_CACHE_TTL_MS:-15000}
      # ── Debug-compare throttle (already hardcoded to 60s; kept here for visibility)
      ORDERBOOK_DEBUG_COMPARE_TTL_MS: ${ORDERBOOK_DEBUG_COMPARE_TTL_MS:-60000}
      # ── Dynamic tracked symbols manager
      DENSITY_TRACKED_SYMBOLS_LIMIT: ${DENSITY_TRACKED_SYMBOLS_LIMIT:-100}
      DENSITY_TRACKED_REFRESH_MS: ${DENSITY_TRACKED_REFRESH_MS:-15000}
      DENSITY_TRACKED_MIN_HOLD_MS: ${DENSITY_TRACKED_MIN_HOLD_MS:-180000}
      # ── Auth
      JWT_SECRET: ${JWT_SECRET:-trackista-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-30d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      # ── Object storage (MinIO)
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-trackista-alerts}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost:9000}
      ALERT_MAX_IMAGE_BYTES: ${ALERT_MAX_IMAGE_BYTES:-10485760}
      # ── Bar aggregator storage (1600 = ~26.7h, covers 24h correlation window + safety buffer)
      BARS_MAX_REDIS_BARS: ${BARS_MAX_REDIS_BARS:-1600}
      # ── Rate limits (override defaults for dev/test; set in .env for production)
      RATE_LIMIT_POST_MAX: ${RATE_LIMIT_POST_MAX:-500}
      RATE_LIMIT_POST_WINDOW_SEC: ${RATE_LIMIT_POST_WINDOW_SEC:-3600}
      RATE_LIMIT_COMMENT_MAX: ${RATE_LIMIT_COMMENT_MAX:-200}
      RATE_LIMIT_VOTE_MAX: ${RATE_LIMIT_VOTE_MAX:-500}
      # ── Market impulse / surge alerts
      MARKET_IMPULSE_ENABLED: "true"
      PRICE_SURGE_ENABLED: "true"
      PRICE_SURGE_MOVE_PCT: "5.0"
      PRICE_SURGE_COOLDOWN_SEC: "300"
      # ── Heatmap orderbook history
      HEATMAP_ENABLED: "true"
      HEATMAP_MAX_SYMBOLS: "20"
      # HEATMAP_DEFAULT_SYMBOLS: top-20 by 24h futures volume auto-selected from Redis at startup
      HEATMAP_RANGE_PERCENT: "3"
      HEATMAP_BUCKET_TICK_MULTIPLIER: "1"
      HEATMAP_SNAPSHOT_INTERVAL_SEC: "1"
      # ── Density DOM / footprint
      DOM_ENABLED: "true"
      DOM_MAX_SYMBOLS: "20"
      DOM_DEFAULT_SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT"
      DOM_LEVELS_ABOVE: "200"
      DOM_LEVELS_BELOW: "200"
      # ── Web Push (VAPID)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_CONTACT: ${VAPID_CONTACT:-mailto:admin@trackista.live}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./media:/app/media
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - trackista-network

  # ─────────────────────────────────────────────
  # COLLECTOR — Binance WebSocket data ingestion
  # ─────────────────────────────────────────────
  collector:
    build:
      context: ./collector
    container_name: trackista-collector
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      BINANCE_SPOT_WS: ${BINANCE_SPOT_WS}
      BINANCE_FUTURES_WS: ${BINANCE_FUTURES_WS}
      ORDERBOOK_SYMBOLS: ${ORDERBOOK_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT}
      FUTURES_ORDERBOOK_SYMBOLS: ${FUTURES_ORDERBOOK_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT}
      MIN_WALL_SIZE_USD: ${MIN_WALL_SIZE_USD:-100000}
      MAX_WALL_DISTANCE_PCT: ${MAX_WALL_DISTANCE_PCT:-10}
      SPOT_MAX_SYMBOLS: ${SPOT_MAX_SYMBOLS:-200}
      SPOT_STARTUP_STAGGER_MS: ${SPOT_STARTUP_STAGGER_MS:-2000}
      WALL_SCAN_INTERVAL_MS: ${WALL_SCAN_INTERVAL_MS:-10000}
      ORDERBOOK_FLUSH_INTERVAL_MS: ${ORDERBOOK_FLUSH_INTERVAL_MS:-1000}
      FUTURES_STARTUP_DELAY_MS: ${FUTURES_STARTUP_DELAY_MS:-60000}
      FUTURES_STARTUP_STAGGER_MS: ${FUTURES_STARTUP_STAGGER_MS:-2000}
      # ── Rate limit safeguards (tunable without rebuild)
      ORDERBOOK_RESYNC_COOLDOWN_MS: ${ORDERBOOK_RESYNC_COOLDOWN_MS:-15000}
      FUTURES_RESYNC_COOLDOWN_MS: ${FUTURES_RESYNC_COOLDOWN_MS:-60000}
      FUTURES_SNAPSHOT_MIN_GAP_MS: ${FUTURES_SNAPSHOT_MIN_GAP_MS:-3000}
      ORDERBOOK_RATE_LIMIT_BACKOFF_MS: ${ORDERBOOK_RATE_LIMIT_BACKOFF_MS:-10000}
      ORDERBOOK_RATE_LIMIT_BACKOFF_MAX_MS: ${ORDERBOOK_RATE_LIMIT_BACKOFF_MAX_MS:-300000}
      # ── Dynamic tracked symbols (collector reads Redis key on startup + polls for new additions)
      DENSITY_TRACKED_REFRESH_MS: ${DENSITY_TRACKED_REFRESH_MS:-15000}
      # ── Universe builder (TZ: tracked symbol selection by volume)
      FUTURES_TRACKED_MAX_SYMBOLS: ${FUTURES_TRACKED_MAX_SYMBOLS:-600}
      FUTURES_MAX_SYMBOLS: ${FUTURES_MAX_SYMBOLS:-50}
      TRACK_MIN_VOLUME_24H_USD: ${TRACK_MIN_VOLUME_24H_USD:-1000000}
      TRACKED_UNIVERSE_REFRESH_MS: ${TRACKED_UNIVERSE_REFRESH_MS:-60000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trackista-network

  # ─────────────────────────────────────────────
  # FUTURE SERVICES (reserved — not active yet):
  #   notifier      — alerts, Telegram, messages
  #   aggregator    — analytics aggregation
  #   signal-engine — impulse / pump / knife-catch / wall-break
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # MINIO — S3-compatible object storage for alert screenshots
  # Console: http://localhost:9001  (user/pass from MINIO_ROOT_USER/PASSWORD)
  # API:     http://localhost:9000
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: trackista-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - trackista-network

  # ─────────────────────────────────────────────
  # NGINX — Production reverse proxy & static file server
  # Proxies /api/* and /ws/* to backend
  # Serves frontend SPA build from ./frontend/dist
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: trackista-nginx
    ports:
      - "${NGINX_PORT:-80}:80"   # Port 80 by default; override with NGINX_PORT=8080 for local testing
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trackista-network
    profiles:
      - production

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  trackista-network:
    driver: bridge
