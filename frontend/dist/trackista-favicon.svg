<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="192" height="192" fill="#0a0e27"/>
  
  <!-- Subtle grid background -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="48" x2="192" y2="48"/>
    <line x1="0" y1="96" x2="192" y2="96"/>
    <line x1="0" y1="144" x2="192" y2="144"/>
    <line x1="48" y1="0" x2="48" y2="192"/>
    <line x1="96" y1="0" x2="96" y2="192"/>
    <line x1="144" y1="0" x2="144" y2="192"/>
  </g>
  
  <!-- Main logo: "T" letter with tracking symbol -->
  <!-- Top horizontal bar of T -->
  <rect x="42" y="35" width="108" height="12" fill="url(#mainGradient)" filter="url(#glow)" rx="2"/>
  
  <!-- Vertical bar of T -->
  <rect x="84" y="47" width="24" height="90" fill="url(#mainGradient)" filter="url(#glow)" rx="3"/>
  
  <!-- Tracking dot (moving indicator) -->
  <circle cx="96" cy="155" r="10" fill="#00ff88" filter="url(#glow)"/>
  
  <!-- Uptrend curve inside the T -->
  <path d="M 65 100 Q 80 85 96 75" stroke="#00d4ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 96 75 Q 112 65 127 80" stroke="#00ff88" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
