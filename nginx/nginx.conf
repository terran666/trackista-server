# ====================================================================
# Trackista Production Nginx Configuration
# ====================================================================
# Routes:
#   /api/*    → trackista-backend:3000 (HTTP API proxy)
#   /ws/*     → trackista-backend:3000 (WebSocket proxy with upgrade)
#   /*        → Frontend SPA (static files with try_files fallback)
#
# Critical:
#   - proxy_pass must NOT have trailing slash to preserve full path
#   - /api and /ws must NOT fall through to SPA fallback
# ====================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # Upstream backend
    upstream backend {
        server trackista-backend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Root directory for frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # ================================================================
        # API PROXY — /api/* → backend:3000
        # ================================================================
        # CRITICAL: No trailing slash after backend:3000
        #           This preserves the full path including /api prefix
        # ================================================================
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ================================================================
        # WEBSOCKET PROXY — /ws/* → backend:3000
        # ================================================================
        # CRITICAL: Must include Upgrade and Connection headers
        #           No trailing slash after backend:3000
        # ================================================================
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Long timeout for WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # ================================================================
        # LEGACY REDIRECT — /heatmap → /impulse (301 permanent)
        # ================================================================
        location = /heatmap {
            return 301 /impulse;
        }

        # ================================================================
        # FRONTEND SPA — catch-all for /* 
        # ================================================================
        # Serves static files from /usr/share/nginx/html
        # Falls back to index.html for client-side routing
        # ================================================================
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # No cache for index.html
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
